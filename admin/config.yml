backend:
  name: git-gateway
  repo: Zuni8wlh/agitex-website
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/26fc80ed-eea7-414a-a786-03e08758bf24/pkce
  auth_token_endpoint: /sites/26fc80ed-eea7-414a-a786-03e08758bf24/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://agitex.netlify.app

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "designs"
    label: "Katalog Desain"
    files:
      - file: "content/designs.json"
        label: "Semua Desain"
        name: "designs"
        fields:
          - label: "Daftar Desain"
            name: "designs"
            widget: "list"
            summary: "{{fields.name}} — {{fields.fabricType}}"
            fields:
              - { label: "ID (angka unik, jangan diulang)", name: "id", widget: "number", value_type: "int" }
              - { label: "Nama Desain", name: "name", widget: "string" }
              - label: "Jenis Kain"
                name: "fabricType"
                widget: "select"
                options:
                  - { label: "Cotton", value: "cotton" }
                  - { label: "Linen", value: "linen" }
                  - { label: "Denim", value: "denim" }
                  - { label: "Satin", value: "satin" }
                  - { label: "Rayon", value: "rayon" }
              - { label: "Produk Asli? (aktif = foto real, non-aktif = referensi desain)", name: "real", widget: "boolean", default: true }
              - { label: "Foto", name: "img", widget: "image" }
              - { label: "Komposisi Kain", name: "fabricComposition", widget: "string" }
              - { label: "Berat Kain (gsm atau oz)", name: "weight", widget: "string" }
              - { label: "Lebar Kain", name: "width", widget: "string" }
              - { label: "MOQ (minimum order)", name: "moq", widget: "string" }
              - { label: "Harga", name: "price", widget: "string" }
